name: Publish t3code packages to AUR

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Build and publish even when the upstream hash is unchanged"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  UPSTREAM_REPO: ${{ vars.UPSTREAM_REPO || 'pingdotgg/t3code' }}
  AUR_COMMIT_NAME: ${{ vars.AUR_COMMIT_NAME || 't3code-ci' }}
  AUR_COMMIT_EMAIL: ${{ vars.AUR_COMMIT_EMAIL || 't3code-ci@users.noreply.github.com' }}

jobs:
  publish:
    name: Check, build, and publish (${{ matrix.package.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        package:
          - name: t3code-bin
            package_dir: .
            pkgbuild_path: PKGBUILD
            srcinfo_path: .SRCINFO
            state_file: upstream.sha256
            aur_git_url: ssh://aur@aur.archlinux.org/t3code-bin.git
            aur_payload_files: PKGBUILD .SRCINFO LICENSE t3code-icon.png
            release_prerelease: 'false'
            release_tag_regex: '^v'
            release_version_prefix: 'v'
            asset_regex: '^T3-Code-.*-x86_64\.AppImage$'
          - name: t3code-nightly-bin
            package_dir: packages/t3code-nightly-bin
            pkgbuild_path: packages/t3code-nightly-bin/PKGBUILD
            srcinfo_path: packages/t3code-nightly-bin/.SRCINFO
            state_file: packages/t3code-nightly-bin/upstream.sha256
            aur_git_url: ssh://aur@aur.archlinux.org/t3code-nightly-bin.git
            aur_payload_files: packages/t3code-nightly-bin/PKGBUILD packages/t3code-nightly-bin/.SRCINFO LICENSE t3code-icon.png
            release_prerelease: 'true'
            release_tag_regex: '^v[0-9]+\.[0-9]+\.[0-9]+-nightly\.'
            release_version_prefix: 'v'
            asset_regex: '^T3-Code-.*-x86_64\.AppImage$'
    defaults:
      run:
        shell: bash
    container:
      image: archlinux:base-devel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tooling
        run: |
          set -euo pipefail
          pacman -Sy --noconfirm --needed git openssh rsync curl github-cli jq

      - name: Re-checkout repository with git
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate repository layout
        run: |
          set -euo pipefail
          test -f "${{ matrix.package.pkgbuild_path }}"
          test -f "${{ matrix.package.srcinfo_path }}"
          test -f LICENSE
          test -f t3code-icon.png
          test -x scripts/check_upstream.sh
          test -x scripts/stage_shared_assets.sh
          test -x scripts/update_pkgbuild.sh
          test -x scripts/publish_aur.sh

      - name: Check upstream AppImage metadata
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          STATE_FILE: ${{ matrix.package.state_file }}
          RELEASE_PRERELEASE: ${{ matrix.package.release_prerelease }}
          RELEASE_TAG_REGEX: ${{ matrix.package.release_tag_regex }}
          RELEASE_VERSION_PREFIX: ${{ matrix.package.release_version_prefix }}
          ASSET_REGEX: ${{ matrix.package.asset_regex }}
        run: |
          set -euo pipefail
          scripts/check_upstream.sh

      - name: Decide whether to publish
        id: decide
        env:
          CHANGED: ${{ steps.check.outputs.changed }}
          EVENT_NAME: ${{ github.event_name }}
          FORCE_PUBLISH: ${{ github.event.inputs.force_publish }}
        run: |
          set -euo pipefail

          should_publish=false
          if [[ "$CHANGED" == "true" ]]; then
            should_publish=true
          elif [[ "$EVENT_NAME" == "push" ]]; then
            should_publish=true
          elif [[ "$FORCE_PUBLISH" == "true" ]]; then
            should_publish=true
          fi

          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"
          echo "should_publish=$should_publish"

      - name: Skip when no publish is needed
        if: steps.decide.outputs.should_publish != 'true'
        run: |
          echo "No upstream change and no forced publish detected; nothing to do."

      - name: Update PKGBUILD and upstream state
        if: steps.check.outputs.changed == 'true'
        id: update
        env:
          PKGBUILD_PATH: ${{ matrix.package.pkgbuild_path }}
          UPSTREAM_TAG: ${{ steps.check.outputs.upstream_tag }}
          UPSTREAM_VERSION: ${{ steps.check.outputs.upstream_version }}
          PKGVER_CANDIDATE: ${{ steps.check.outputs.pkgver_candidate }}
          APPIMAGE_SHA256: ${{ steps.check.outputs.appimage_sha256 }}
          STATE_FILE: ${{ matrix.package.state_file }}
        run: |
          set -euo pipefail
          scripts/update_pkgbuild.sh

      - name: Create non-root build user
        if: steps.decide.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Stage shared package assets
        if: steps.decide.outputs.should_publish == 'true'
        env:
          WORKSPACE_ROOT: ${{ github.workspace }}
          PACKAGE_DIR: ${{ github.workspace }}/${{ matrix.package.package_dir }}
        run: |
          set -euo pipefail
          scripts/stage_shared_assets.sh

      - name: Regenerate .SRCINFO
        if: steps.decide.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          su - builder -c "cd '$GITHUB_WORKSPACE/${{ matrix.package.package_dir }}' && makepkg --printsrcinfo > .SRCINFO"

      - name: Build package
        if: steps.decide.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          su - builder -c "cd '$GITHUB_WORKSPACE/${{ matrix.package.package_dir }}' && makepkg -f --nodeps --noconfirm"

      - name: Upload build artifact
        if: steps.decide.outputs.should_publish == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package.name }}-package
          if-no-files-found: error
          path: ${{ matrix.package.package_dir }}/*.pkg.tar.zst

      - name: Publish package files to AUR
        if: steps.decide.outputs.should_publish == 'true'
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          AUR_GIT_URL: ${{ matrix.package.aur_git_url }}
          AUR_BRANCH: ${{ vars.AUR_BRANCH || 'master' }}
          AUR_COMMIT_NAME: ${{ env.AUR_COMMIT_NAME }}
          AUR_COMMIT_EMAIL: ${{ env.AUR_COMMIT_EMAIL }}
          AUR_PAYLOAD_FILES: ${{ matrix.package.aur_payload_files }}
        run: |
          set -euo pipefail
          scripts/publish_aur.sh

      - name: Commit and push metadata updates
        if: steps.check.outputs.changed == 'true'
        env:
          PKGVER: ${{ steps.update.outputs.pkgver }}
          PKGREL: ${{ steps.update.outputs.pkgrel }}
          PKGBUILD_PATH: ${{ matrix.package.pkgbuild_path }}
          SRCINFO_PATH: ${{ matrix.package.srcinfo_path }}
          STATE_FILE: ${{ matrix.package.state_file }}
        run: |
          set -euo pipefail

          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git rev-parse --is-inside-work-tree >/dev/null

          git add "${PKGBUILD_PATH}" "${SRCINFO_PATH}" "${STATE_FILE}"
          if git diff --cached --quiet; then
            echo "No staged changes to commit."
            exit 0
          fi

          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "chore(update): ${{ matrix.package.name }} ${PKGVER}-${PKGREL}"
          # Pull any commits pushed by earlier matrix jobs before pushing.
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
